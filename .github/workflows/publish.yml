name: publish
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch: # lets llms-refresh.yml redeploy when a source repo changes
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v3
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install poetry
      - run: poetry install
      - name: Build integration source dumps (docs/llms/*.txt — not committed, built here)
        run: poetry run python scripts/build_llms.py
      - run: poetry run mkdocs gh-deploy --force
